name: Generate ASCII Artwork

on: push

jobs:
  build-job-1:
    runs-on: ubuntu-latest
    steps:
      - name: Install cowsay
        run: sudo apt-get update && sudo apt-get install -y cowsay

      - name: Execute cowsay
        run: cowsay -f dragon "I hope you like it HOT" >> dragon.txt

      - name: Upload Dragon artifact
      - uses: actions/upload-artifact@v6
        with:
          name: dragon-artifact
          path: dragon.txt

  test-job-2:
    needs: build-job-1
    runs-on: ubuntu-latest
    steps:
      - name: Download Dragon artifact
      - uses: actions/download-artifact@v8
        with:
          name: dragon-artifact
      - name: Display structure of downloaded files
        run: ls -R

      - name: Test file exists
        run: grep -i "hope" dragon.txt

  deploy-job-3:
    needs: [test-job-2, build-job-1]
    runs-on: ubuntu-latest
    steps:
      - name: Download Dragon artifact
      - uses: actions/download-artifact@v8
        with:
          name: dragon-artifact
      - name: Display structure of downloaded files
        run: ls -R

      - name: Read file content
        run: cat dragon.txt

      - name: Deploy
        run: echo "Deploying the ASCII art..."
      
      
      
      
      
      
      
      
      
      
      
      
